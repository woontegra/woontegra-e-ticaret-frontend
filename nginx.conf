server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy — Railway'de ayrı API servisi varsa VITE_API_URL kullanın;
  # aynı domain üzerinden proxy gerekiyorsa upstream ekleyin.
}
